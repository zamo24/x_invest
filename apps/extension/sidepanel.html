<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Investor Copilot</title>
    <style>
      body { font-family: ui-sans-serif, system-ui; margin: 0; background: #f5f8fc; color: #10223a; }
      .wrap { padding: 12px; display: grid; gap: 10px; }
      textarea { width: 100%; min-height: 120px; padding: 10px; }
      button { padding: 10px 12px; border: 0; border-radius: 8px; background: #0f8f75; color: #fff; cursor: pointer; }
      pre { white-space: pre-wrap; background: #fff; border: 1px solid #d4deea; padding: 10px; border-radius: 8px; }
      ul { margin: 0; padding-left: 18px; }
      a { color: #0f4e9a; }
      .error { color: #b02828; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h3>Investor Copilot</h3>
      <textarea id="message">Summarize what I saved about HBM supply and Micron.</textarea>
      <button id="ask">Ask</button>
      <p id="status"></p>
      <pre id="answer"></pre>
      <h4>Sources</h4>
      <ul id="sources"></ul>
    </div>
    <script src="sidepanel.js"></script>
  </body>
</html>
