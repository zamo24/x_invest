services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: copilot
    ports:
      - "55432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d copilot"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      APP_VERSION: ${APP_VERSION:-0.1.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/copilot
      TOKEN_PEPPER: ${TOKEN_PEPPER:-dev-token-pepper-change-me}
      PAT_DEFAULT_TTL_DAYS: ${PAT_DEFAULT_TTL_DAYS:-90}
      PAT_MAX_TTL_DAYS: ${PAT_MAX_TTL_DAYS:-365}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_CHAT_REQUESTS: ${RATE_LIMIT_CHAT_REQUESTS:-30}
      RATE_LIMIT_INGEST_REQUESTS: ${RATE_LIMIT_INGEST_REQUESTS:-60}
      RATE_LIMIT_TOKEN_REQUESTS: ${RATE_LIMIT_TOKEN_REQUESTS:-30}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-^chrome-extension://[a-z]{32}$}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-Authorization,Content-Type}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CLERK_AUDIENCE: ${CLERK_AUDIENCE:-}
      CLERK_JWT_LEEWAY_SECONDS: ${CLERK_JWT_LEEWAY_SECONDS:-30}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-30}
      EMBEDDING_MAX_TOKENS: ${EMBEDDING_MAX_TOKENS:-6000}
      EMBEDDING_MAX_CHARS: ${EMBEDDING_MAX_CHARS:-24000}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-local-hash-v1}
      CHAT_MODEL: ${CHAT_MODEL:-local-grounded-v1}
      HOSTED_CHAT_PROVIDER: ${HOSTED_CHAT_PROVIDER:-openai}
      HOSTED_CHAT_MODELS: ${HOSTED_CHAT_MODELS:-gpt-4o-mini,gpt-4.1-mini,gpt-5-mini,gpt-5.2}
      BYOK_ENCRYPTION_KEY: ${BYOK_ENCRYPTION_KEY:-dev-byok-encryption-key-change-me}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-256}
    command: /bin/sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    working_dir: /repo
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_JWT_TEMPLATE: ${CLERK_JWT_TEMPLATE:-}
      API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    command: /bin/sh -c "pnpm --dir apps/web dev --webpack --hostname 0.0.0.0 --port 3000"
    volumes:
      - ./apps/web:/repo/apps/web
      - web_node_modules:/repo/apps/web/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db_data:
  web_node_modules:
